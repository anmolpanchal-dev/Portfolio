<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Project Stack — Anmol Panchal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Bootstrap 5.3.3 ── -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- ── Bootstrap Icons ── -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <!-- ── Google Fonts: Playfair Display + Plus Jakarta Sans ── -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ── Custom Styles ── -->
  <link rel="stylesheet" href="projectStackStyles.css" />

  <link rel="icon" type="image/png" sizes="32x32" href="../images/profilefevicon.png" />
</head>

<body>

  <!-- ════════════════════════════════════════════
       NAVBAR  (IDs & back-button logic unchanged)
  ════════════════════════════════════════════ -->
  <nav class="navbar navbar-expand-lg sticky-top ps-navbar">
    <div class="container">

      <!-- Back Button — ID unchanged for JS -->
      <button id="previouspage" class="ps-back-btn me-3">
        <i class="bi bi-arrow-left"></i>
        <span>Back</span>
      </button>

      <!-- Brand -->
      <a class="navbar-brand ps-brand" href="#">
        <span class="ps-brand-dot"></span>
        Project Stack
      </a>

      <!-- Live filter pills (desktop) — onchange calls filterStack() unchanged -->
      <div class="ms-auto d-none d-md-flex gap-2 align-items-center" id="desktopPills">
        <button class="ps-pill active" onclick="filterStack('All')">All</button>
        <button class="ps-pill" onclick="filterStack('JavaScript')">JavaScript</button>
        <button class="ps-pill" onclick="filterStack('Bootstrap')">Bootstrap</button>
        <button class="ps-pill" onclick="filterStack('API')">API</button>
      </div>

    </div>
  </nav>


  <!-- ════════════════════════════════════════════
       HERO SECTION
  ════════════════════════════════════════════ -->
  <section class="ps-hero">
    <div class="container">
      <div class="row align-items-center">

        <div class="col-lg-7">
          <!-- Eyebrow label -->
          <span class="ps-eyebrow">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i> My Work
          </span>

          <h1 class="ps-hero-title">
            Things I've<br>
            <em>Designed &amp; Built</em>
          </h1>

          <p class="ps-hero-sub">
            A curated collection of personal projects — real tools, games, and experiments
            crafted with vanilla JavaScript, HTML &amp; CSS.
          </p>

          <!-- Stats row -->
          <div class="ps-stats d-flex gap-4 mt-4">
            <div class="ps-stat">
              <span class="ps-stat-num" id="projectCount">9</span>
              <span class="ps-stat-label">Projects</span>
            </div>
            <div class="ps-stat-divider"></div>
            <div class="ps-stat">
              <span class="ps-stat-num">3</span>
              <span class="ps-stat-label">Technologies</span>
            </div>
            <div class="ps-stat-divider"></div>
            <div class="ps-stat">
              <span class="ps-stat-num">100%</span>
              <span class="ps-stat-label">Open Source</span>
            </div>
          </div>
        </div>

        <!-- Decorative right side -->
        <div class="col-lg-5 d-none d-lg-flex justify-content-end">
          <div class="ps-hero-deco">
            <div class="ps-deco-ring ps-deco-ring--1"></div>
            <div class="ps-deco-ring ps-deco-ring--2"></div>
            <div class="ps-deco-card">
              <i class="bi bi-code-slash"></i>
              <span>9 live projects</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>


  <!-- ════════════════════════════════════════════
       SEARCH / FILTER BAR
  ════════════════════════════════════════════ -->
  <section class="ps-controls-bar">
    <div class="container">
      <div class="row g-3 align-items-center">

        <!-- Search — ID "searchInput" unchanged -->
        <div class="col-sm-6 col-lg-5">
          <div class="ps-search-wrap">
            <i class="bi bi-search ps-search-icon"></i>
            <input
              type="text"
              id="searchInput"
              class="ps-search-input"
              placeholder="Search projects…"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Filter Select — onchange="filterStack(this.value)" unchanged -->
        <div class="col-sm-4 col-lg-3">
          <div class="ps-select-wrap">
            <select class="ps-select" onchange="filterStack(this.value)">
              <option value="All">All Technologies</option>
              <option value="JavaScript">JavaScript</option>
              <option value="Bootstrap">Bootstrap</option>
              <option value="API">API</option>
            </select>
            <i class="bi bi-chevron-down ps-select-icon"></i>
          </div>
        </div>

        <!-- Mobile filter pills -->
        <div class="col-12 d-flex d-md-none gap-2 flex-wrap" id="mobilePills">
          <button class="ps-pill active" onclick="filterStack('All')">All</button>
          <button class="ps-pill" onclick="filterStack('JavaScript')">JS</button>
          <button class="ps-pill" onclick="filterStack('Bootstrap')">Bootstrap</button>
          <button class="ps-pill" onclick="filterStack('API')">API</button>
        </div>

      </div>
    </div>
  </section>


  <!-- ════════════════════════════════════════════
       PROJECT GRID
       Container ID "projectContainer" unchanged
       Cards use Bootstrap col classes unchanged
  ════════════════════════════════════════════ -->
  <section class="ps-grid-section">
    <div class="container pb-5">
      <div class="row g-4" id="projectContainer">
        <!-- JS renders cards here -->
      </div>
    </div>
  </section>


  <!-- ── Bootstrap JS ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ── Project Logic (unchanged) ── -->
  <script src="projectStack.js"></script>

</body>
</html>
